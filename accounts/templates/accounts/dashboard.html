{% extends 'base.html' %}

{% block content %}

<div class="profile-card">

    <div class="avatar">
        {{ user.username|first|upper }}
    </div>

    <h2>{{ user.username }}</h2>

    <p>{{ user.email }}</p>

    <hr>

    <div class="row text-center">

        <div class="col">
            <h5>Status</h5>
            <p class="text-success">Authenticated</p>
        </div>

        <div class="col">
            <h5>Role</h5>

            {% if user.is_superuser %}
                <p>Admin</p>
            {% else %}
                <p>User</p>
            {% endif %}

        </div>

    </div>

    <a href="{% url 'logout' %}" class="btn btn-danger mt-3">
        Logout
    </a>

</div>

{% endblock %}
